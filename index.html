<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="THE TIDE">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <title>THE TIDE - Fishing Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #131f35;
      --surface2: #1a2a45;
      --border: #1e3a5f;
      --text: #e2e8f0;
      --muted: #7898b8;
      --cyan: #38bdf8;
      --cyan-dark: #0ea5e9;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', sans-serif; }

    /* ── Header ── */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0) 0 0;
    }
    #header-inner {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px 8px;
    }
    #header h1 { font-size: 18px; font-weight: 700; color: var(--cyan); flex-shrink: 0; }

    /* ── Spot Search ── */
    #spot-search-row {
      display: flex; gap: 6px; padding: 0 12px 8px; flex-wrap: wrap;
    }
    #pref-select, #spot-input {
      flex: 1; min-width: 100px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 10px;
      font-size: 14px; appearance: none;
    }
    #pref-select { max-width: 130px; }
    #search-btn {
      background: var(--cyan-dark); color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px; font-size: 14px; cursor: pointer;
    }
    #gps-btn {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font-size: 14px; cursor: pointer;
      flex-shrink: 0; white-space: nowrap;
    }
    #gps-btn:disabled { opacity: 0.5; cursor: default; }
    .geo-result-item { border-left: 3px solid var(--cyan); }
    .geo-result-item .spot-area { color: var(--cyan); }

    /* ── Spot List Dropdown ── */
    #spot-list {
      display: none; position: absolute; z-index: 200;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; max-height: 240px; overflow-y: auto;
      left: 12px; right: 12px; top: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #spot-list.open { display: block; }
    .spot-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .spot-item:hover { background: var(--surface); }
    .spot-item .spot-name { font-weight: 600; }
    .spot-item .spot-area { font-size: 12px; color: var(--muted); }

    /* ── Current Spot Badge ── */
    #current-spot {
      padding: 4px 12px 6px;
      font-size: 13px; color: var(--muted);
    }
    #current-spot span { color: var(--cyan); font-weight: 600; }

    /* ── Tabs ── */
    #tabs {
      display: flex; border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
      background: var(--bg);
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 70px; padding: 10px 4px;
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    /* ── Tab Content ── */
    .tab-pane { display: none; padding: 12px; }
    .tab-pane.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 12px;
    }
    .card-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Weather Tab ── */
    #api-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
    }
    #api-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    #api-dot.ok { background: var(--green); }
    #api-dot.err { background: var(--red); }

    .mazume-row {
      display: flex; gap: 8px;
    }
    .mazume-card {
      flex: 1; background: var(--surface2); border-radius: 8px; padding: 10px;
      text-align: center;
    }
    .mazume-card .label { font-size: 11px; color: var(--muted); }
    .mazume-card .time { font-size: 16px; font-weight: 700; color: var(--orange); }
    .mazume-card .range { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .forecast-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .forecast-day {
      background: var(--surface2); border-radius: 10px; padding: 10px;
      text-align: center;
    }
    .forecast-day .fday { font-size: 12px; color: var(--muted); }
    .forecast-day .ficon { font-size: 28px; margin: 4px 0; }
    .forecast-day .ftemp { font-size: 13px; font-weight: 600; }
    .forecast-day .fwind { font-size: 11px; color: var(--cyan); margin-top: 4px; }
    .forecast-day .frain { font-size: 11px; color: #60a5fa; }

    /* ── Tide Tab ── */
    #tide-chart-wrap {
      position: relative; height: 220px; margin-bottom: 4px;
    }
    .tide-meta {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;
    }
    .tide-meta-item {
      background: var(--surface2); border-radius: 8px; padding: 8px 10px;
      text-align: center;
    }
    .tide-meta-item .label { font-size: 11px; color: var(--muted); }
    .tide-meta-item .val { font-size: 15px; font-weight: 700; color: var(--cyan); }
    .tide-badge {
      display: inline-block; border-radius: 6px; padding: 4px 12px;
      font-size: 13px; font-weight: 700; margin-bottom: 8px;
    }
    .tide-badge.大潮 { background: #dc2626; color: #fff; }
    .tide-badge.中潮 { background: #d97706; color: #fff; }
    .tide-badge.小潮 { background: #16a34a; color: #fff; }
    .tide-badge.長潮 { background: #6b7280; color: #fff; }
    .tide-badge.若潮 { background: #2563eb; color: #fff; }

    /* ── Wind Map Tab ── */
    #windy-wrap {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
    }
    #windy-frame {
      width: 100%; height: 440px; border: none; display: block;
    }
    #windy-loading {
      display: flex; align-items: center; justify-content: center;
      height: 440px; color: var(--muted); font-size: 14px;
    }

    /* ── Calendar Tab ── */
    #cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    #cal-title { font-size: 16px; font-weight: 700; }
    .cal-nav {
      background: var(--surface2); border: none; color: var(--text);
      border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 16px;
    }
    #cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    .cal-dow {
      text-align: center; font-size: 11px; color: var(--muted);
      padding: 4px 0;
    }
    .cal-day {
      background: var(--surface2); border-radius: 6px;
      padding: 4px 2px; text-align: center; min-height: 52px;
      cursor: pointer; transition: background 0.15s;
    }
    .cal-day:hover { background: var(--border); }
    .cal-day.today { border: 1px solid var(--cyan); }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day .cday { font-size: 13px; font-weight: 600; }
    .cal-day .ctide { font-size: 9px; margin-top: 2px; }
    .cal-day .ctide-dot { font-size: 14px; line-height: 1; }
    .cal-legend {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .cal-legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; }

    /* ── Loading / Error ── */
    .loading { color: var(--muted); font-size: 14px; padding: 20px; text-align: center; }
    .error-msg { color: var(--red); font-size: 13px; padding: 10px 0; }

    /* ── Responsive ── */
    @media (max-width: 360px) {
      .forecast-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <h1>🎣 釣り天気</h1>
  </div>
  <div id="spot-search-row">
    <select id="pref-select">
      <option value="">都道府県</option>
    </select>
    <input id="spot-input" type="text" placeholder="釣り場・地名を検索..." autocomplete="off">
    <button id="search-btn" onclick="openSpotList()">検索</button>
    <button id="gps-btn" onclick="getGpsLocation()">📍 現在地</button>
  </div>
  <div id="spot-list"></div>
  <div id="current-spot">選択中: <span id="spot-name-label">---</span></div>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('weather',this)">☀️ 天気</button>
    <button class="tab-btn" onclick="showTab('tide',this)">🌊 潮汐</button>
    <button class="tab-btn" onclick="showTab('wind',this)">💨 風マップ</button>
    <button class="tab-btn" onclick="showTab('calendar',this)">📅 潮汐暦</button>
  </div>
</div>

<!-- ── 天気タブ ── -->
<div id="tab-weather" class="tab-pane active">
  <div id="api-status">
    <div id="api-dot"></div>
    <span id="api-status-text">Open-Meteo 接続確認中...</span>
  </div>

  <div class="card">
    <div class="card-title">朝マズメ・夕マズメ</div>
    <div class="mazume-row" id="mazume-row">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">3日間天気予報</div>
    <div class="forecast-grid" id="forecast-grid">
      <div class="loading" style="grid-column:1/-1">読み込み中...</div>
    </div>
  </div>
</div>

<!-- ── 潮汐タブ ── -->
<div id="tab-tide" class="tab-pane">
  <div class="card">
    <div class="card-title">今日の潮汐</div>
    <div id="tide-type-badge"></div>
    <div id="tide-chart-wrap">
      <canvas id="tide-chart"></canvas>
      <div id="tide-loading" class="loading">潮汐データ読み込み中...</div>
    </div>
    <div class="tide-meta" id="tide-meta"></div>
  </div>
  <div class="card" id="tide-detail-card">
    <div class="card-title">満潮・干潮</div>
    <div id="tide-peaks"></div>
  </div>
</div>

<!-- ── 風マップタブ ── -->
<div id="tab-wind" class="tab-pane" style="padding:0;">
  <div id="windy-wrap">
    <div id="windy-loading">💨 Windy 風マップを読み込み中...</div>
    <iframe id="windy-frame" style="display:none;"
      allowfullscreen
      loading="lazy"
      title="Windy 風マップ">
    </iframe>
  </div>
  <div style="padding:10px 12px; font-size:12px; color:var(--muted);">
    Powered by <a href="https://www.windy.com" style="color:var(--cyan);">Windy.com</a>
  </div>
</div>

<!-- ── 潮汐カレンダータブ ── -->
<div id="tab-calendar" class="tab-pane">
  <div class="card">
    <div id="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <div id="cal-title"></div>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div id="cal-grid"></div>
    <div class="cal-legend">
      <div class="cal-legend-item">🔴 大潮</div>
      <div class="cal-legend-item">🟠 中潮</div>
      <div class="cal-legend-item">🟢 小潮</div>
      <div class="cal-legend-item">⚪ 長潮</div>
      <div class="cal-legend-item">🔵 若潮</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 状態管理
// ═══════════════════════════════════════════════════════
let spots = [];
let currentSpot = null;
let tideChartInst = null;
let windyLoaded = false;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed

// ═══════════════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════════════
async function init() {
  // PWA Service Worker 登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // スポットデータ読み込み
  try {
    const res = await fetch('/spots.json');
    spots = await res.json();
    buildPrefList();
    // デフォルト：串本
    const def = spots.find(s => s.id === 'kushimoto') || spots[0];
    selectSpot(def);
  } catch (e) {
    console.error('spots.json load error', e);
  }

  // Open-Meteo 接続確認（currentSpotが設定された後に呼ばれる）
}

// ═══════════════════════════════════════════════════════
// スポット選択
// ═══════════════════════════════════════════════════════
function selectSpot(spot) {
  currentSpot = spot;
  document.getElementById('spot-name-label').textContent = `${spot.name}（${spot.area}）`;
  closeSpotList();

  // アクティブなタブに応じてデータを再ロード
  const activeTab = document.querySelector('.tab-pane.active');
  if (activeTab) {
    const id = activeTab.id.replace('tab-', '');
    loadTabData(id);
  }
}

// ═══════════════════════════════════════════════════════
// タブ切り替え
// ═══════════════════════════════════════════════════════
function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  loadTabData(name);
}

function loadTabData(name) {
  if (!currentSpot) return;
  if (name === 'weather') loadWeather();
  else if (name === 'tide') loadTide();
  else if (name === 'wind') loadWind();
  else if (name === 'calendar') renderCalendar();
}

// ═══════════════════════════════════════════════════════
// 都道府県リスト構築
// ═══════════════════════════════════════════════════════
function buildPrefList() {
  const prefs = [...new Set(spots.map(s => s.prefecture))];
  const sel = document.getElementById('pref-select');
  prefs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  sel.onchange = () => filterSpots();
}

function filterSpots() {
  const pref = document.getElementById('pref-select').value;
  const q = document.getElementById('spot-input').value.trim();
  let list = spots;
  if (pref) list = list.filter(s => s.prefecture === pref);
  if (q) list = list.filter(s => s.name.includes(q) || s.area.includes(q) || s.prefecture.includes(q));
  renderSpotList(list, q);
}

function openSpotList() {
  filterSpots();
  document.getElementById('spot-list').classList.add('open');
}

function closeSpotList() {
  document.getElementById('spot-list').classList.remove('open');
}

function renderSpotList(list, query) {
  const el = document.getElementById('spot-list');
  let html = list.slice(0, 15).map(s => `
    <div class="spot-item" onclick="selectSpot(spots.find(x=>x.id==='${s.id}'))">
      <div class="spot-name">${s.name}</div>
      <div class="spot-area">${s.prefecture} · ${s.area} · ${s.types.join(' ')}</div>
    </div>
  `).join('');

  if (!list.length && query) {
    html = `<div class="spot-item" style="color:var(--muted);font-size:13px;">釣り場が見つかりません — 地名で検索中...</div>`;
  }

  el.innerHTML = html;
  el.classList.add('open');

  // 釣り場に一致がなくキーワードがある場合、地名ジオコーディングを非同期で追加
  if (query && list.length < 3) {
    clearTimeout(geocodeTimer);
    geocodeTimer = setTimeout(async () => {
      const geoResults = await geocodeSearch(query);
      if (!geoResults || !geoResults.length) return;
      const geoHtml = geoResults.map((r, i) => `
        <div class="spot-item geo-result-item" onclick="selectGeoResult(${i})">
          <div class="spot-name">📍 ${r.name}</div>
          <div class="spot-area">${r.fullName.split(',').slice(0,3).join(', ')}</div>
        </div>
      `).join('');
      el.innerHTML += geoHtml;
      window._geoResults = geoResults;
    }, 600);
  }
}

function selectGeoResult(i) {
  const r = window._geoResults?.[i];
  if (!r) return;
  geocodeVirtualSpot = createVirtualSpot(r.name, r.lat, r.lon);
  selectSpot(geocodeVirtualSpot);
}

// 検索入力でリアルタイムフィルタ
document.getElementById('spot-input').addEventListener('input', () => {
  openSpotList();
});

// 外クリックで閉じる
document.addEventListener('click', e => {
  const header = document.getElementById('header');
  if (!header.contains(e.target)) closeSpotList();
});

// ═══════════════════════════════════════════════════════
// 天気タブ
// ═══════════════════════════════════════════════════════
const WMO_ICONS = {
  0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
  45:'🌫', 48:'🌫',
  51:'🌦', 53:'🌦', 55:'🌧',
  61:'🌧', 63:'🌧', 65:'🌧',
  71:'🌨', 73:'🌨', 75:'❄️',
  80:'🌦', 81:'🌧', 82:'⛈',
  95:'⛈', 96:'⛈', 99:'⛈',
};
const WIND_DIR = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
function degToDir(deg) { return WIND_DIR[Math.round(deg / 22.5) % 16]; }

async function loadWeather() {
  if (!currentSpot) return;
  const { lat, lon } = currentSpot;

  // Open-Meteo 接続確認 & 天気データ取得
  const dot = document.getElementById('api-dot');
  const statusText = document.getElementById('api-status-text');
  statusText.textContent = '接続確認中...';
  dot.className = '';

  try {
    const [meteoRes, sunRes] = await Promise.all([
      fetch(`/api/openmeteo?lat=${lat}&lon=${lon}`),
      fetch(`/api/sun?lat=${lat}&lon=${lon}`)
    ]);

    if (!meteoRes.ok) throw new Error('Open-Meteo error');
    const meteo = await meteoRes.json();
    const sun = sunRes.ok ? await sunRes.json() : null;

    dot.className = 'ok';
    statusText.textContent = '✅ Open-Meteo 接続OK（無料APIキー不要）';

    renderMazume(sun);
    renderForecast(meteo);
  } catch (e) {
    dot.className = 'err';
    statusText.textContent = '❌ 接続エラー: ' + e.message;
    document.getElementById('forecast-grid').innerHTML = `<div class="error-msg" style="grid-column:1/-1">データ取得失敗</div>`;
  }
}

function renderMazume(sun) {
  const el = document.getElementById('mazume-row');
  if (!sun || sun.error) {
    el.innerHTML = '<div class="loading">データなし</div>';
    return;
  }
  el.innerHTML = `
    <div class="mazume-card">
      <div class="label">🌅 朝マズメ</div>
      <div class="time">${sun.mornStart}〜${sun.mornEnd}</div>
      <div class="range">日の出 ${sun.sunrise}</div>
    </div>
    <div class="mazume-card">
      <div class="label">🌇 夕マズメ</div>
      <div class="time">${sun.duskStart}〜${sun.duskEnd}</div>
      <div class="range">日没 ${sun.sunset}</div>
    </div>
  `;
}

function renderForecast(meteo) {
  const el = document.getElementById('forecast-grid');
  const daily = meteo.daily;
  if (!daily) { el.innerHTML = '<div class="error-msg">データなし</div>'; return; }

  const days = ['今日', '明日', '明後日'];
  el.innerHTML = daily.time.slice(0, 3).map((date, i) => {
    const code = daily.weathercode[i];
    const icon = WMO_ICONS[code] || '🌡️';
    const tmax = daily.temperature_2m_max[i]?.toFixed(0) ?? '--';
    const tmin = daily.temperature_2m_min[i]?.toFixed(0) ?? '--';
    const wind = daily.windspeed_10m_max[i]?.toFixed(1) ?? '--';
    const wdir = daily.winddirection_10m_dominant?.[i];
    const dirStr = wdir != null ? degToDir(wdir) : '';
    const rain = daily.precipitation_sum[i]?.toFixed(1) ?? '--';
    return `
      <div class="forecast-day">
        <div class="fday">${days[i] || date}</div>
        <div class="ficon">${icon}</div>
        <div class="ftemp">${tmax}° / ${tmin}°</div>
        <div class="fwind">💨 ${wind}km/h ${dirStr}</div>
        <div class="frain">☔ ${rain}mm</div>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════════════════════
// 潮汐タブ
// ═══════════════════════════════════════════════════════
// 海しるAPI で解決したhcをキャッシュ（LocalStorage: "tideHc_<spotId>"）
function getCachedHc(spotId) {
  try {
    const v = localStorage.getItem(`tideHc_${spotId}`);
    return v ? JSON.parse(v) : null;
  } catch { return null; }
}
function setCachedHc(spotId, pc, hc) {
  try { localStorage.setItem(`tideHc_${spotId}`, JSON.stringify({ pc, hc })); } catch {}
}

async function loadTide() {
  if (!currentSpot) return;
  const loading = document.getElementById('tide-loading');

  loading.style.display = 'flex';
  loading.textContent = '潮汐データ読み込み中...';
  document.getElementById('tide-meta').innerHTML = '';
  document.getElementById('tide-peaks').innerHTML = '';
  document.getElementById('tide-type-badge').innerHTML = '';

  // カスタム地点（現在地・地名検索）— 海しるAPIで最寄り地点を探す
  if (currentSpot.isCustom) {
    loading.textContent = '🌊 最寄り潮汐観測地点を検索中（海しるAPI）...';
    const resolved = await resolveTideViaKaishiru(currentSpot.lat, currentSpot.lon, null);
    if (resolved) return;
    const tideType = calcTideType(new Date());
    document.getElementById('tide-type-badge').innerHTML =
      `<span class="tide-badge ${tideType}">${tideType}（月齢推定）</span>`;
    loading.textContent = '📍 カスタム地点の潮汐データを取得できませんでした。';
    return;
  }

  const pc = currentSpot.tidePc;
  let hc = currentSpot.tideHc;

  // hc が未設定の場合、まずキャッシュを確認
  if (hc == null) {
    const cached = getCachedHc(currentSpot.id);
    if (cached) { hc = cached.hc; }
  }

  // それでも未設定なら海しるAPIで自動解決を試みる
  if (hc == null) {
    loading.textContent = '🌊 海しるAPIで最寄り港を自動検索中...';
    const resolved = await resolveTideViaKaishiru(currentSpot.lat, currentSpot.lon, currentSpot.id);
    if (resolved) return;
    // 自動解決できなかった場合
    const tideType = calcTideType(new Date());
    document.getElementById('tide-type-badge').innerHTML =
      `<span class="tide-badge ${tideType}">${tideType}（月齢推定）</span>`;
    loading.innerHTML = `⚠️ 港コード(hc)が未設定、かつ海しるAPIキーが未設定です<br>
      <a href="https://tide736.net" target="_blank" style="color:var(--cyan)">tide736.net</a>
      でこの港を選び URLの <code>hc=数字</code> を確認するか、<br>
      <a href="https://portal.msil.go.jp" target="_blank" style="color:var(--cyan)">portal.msil.go.jp</a>
      で海しるAPIキーを取得して Vercel に設定してください。<br>
      <small style="color:var(--muted)">環境変数: MSIL_SUBSCRIPTION_KEY</small>`;
    return;
  }

  await fetchAndRenderTide(pc, hc);
}

// 海しるAPI経由でhcを自動解決してチャートを表示
// 成功時 true を返す
async function resolveTideViaKaishiru(lat, lon, spotId) {
  const loading = document.getElementById('tide-loading');
  try {
    const res = await fetch(`/api/msil?lat=${lat}&lon=${lon}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.configured === false) {
        // キー未設定 → falseを返して呼び元でフォールバック処理
        return false;
      }
      throw new Error(err.error || `status ${res.status}`);
    }
    const data = await res.json();
    const nearest = data.nearest;

    if (!nearest) {
      loading.textContent = '⚠️ 近くに潮汐観測地点が見つかりませんでした（100km以内）';
      return true; // handled
    }

    // tide736.net の hc が解決できた場合はチャートを表示
    if (nearest.pc != null && nearest.hc != null) {
      if (spotId) setCachedHc(spotId, nearest.pc, nearest.hc);
      await fetchAndRenderTide(nearest.pc, nearest.hc, nearest.name);
      return true;
    }

    // hcは解決できなかったが公式リンクは取得できた
    const distStr = nearest.dist != null ? `（約${nearest.dist.toFixed(0)}km）` : '';
    const stationName = nearest.name || '最寄り潮汐観測地点';
    const linkHtml = nearest.linkUrl
      ? `<a href="${nearest.linkUrl}" target="_blank" style="color:var(--cyan)">${stationName}の潮汐予報を確認 →</a>`
      : `<span style="color:var(--muted)">${stationName}${distStr}</span>`;

    const tideType = calcTideType(new Date());
    document.getElementById('tide-type-badge').innerHTML =
      `<span class="tide-badge ${tideType}">${tideType}（月齢推定）</span>`;
    loading.innerHTML = `🌊 海しるAPI: ${stationName}${distStr}<br>${linkHtml}<br>
      <small style="color:var(--muted)">※ 公式リンク先で詳細な潮汐予報を確認できます</small>`;
    return true;

  } catch (e) {
    console.warn('msil resolve failed:', e.message);
    return false;
  }
}

async function fetchAndRenderTide(pc, hc, stationName) {
  const loading = document.getElementById('tide-loading');
  try {
    const res = await fetch(`/api/tide?pc=${pc}&hc=${hc}`);
    if (!res.ok) throw new Error(`tide API error ${res.status}`);
    const data = await res.json();
    loading.style.display = 'none';
    if (stationName) {
      document.getElementById('tide-meta').innerHTML =
        `<div class="tide-meta-item" style="grid-column:1/-1"><div class="label">観測地点</div><div class="val" style="font-size:13px">${stationName}（海しるAPI）</div></div>`;
    }
    renderTideChart(data);
  } catch (e) {
    loading.textContent = `潮汐データ取得失敗: ${e.message}`;
    const tideType = calcTideType(new Date());
    document.getElementById('tide-type-badge').innerHTML =
      `<span class="tide-badge ${tideType}">${tideType}（月齢推定）</span>`;
  }
}

function renderTideChart(data) {
  // tide736.net API レスポンス仕様:
  // data.tide.chart["YYYY-MM-DD"].tide   = [{time, unix, cm}]  毎時水位
  // data.tide.chart["YYYY-MM-DD"].edd    = [{time, unix, cm}]  干潮
  // data.tide.chart["YYYY-MM-DD"].flood  = [{time, unix, cm}]  満潮
  // data.tide.chart["YYYY-MM-DD"].moon.title = 潮名（大潮/中潮/小潮/長潮/若潮）
  // data.tide.chart["YYYY-MM-DD"].sun.rise / sun.set = 日の出/日没

  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const dateKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const chart = data?.tide?.chart?.[dateKey];

  if (!chart) {
    document.getElementById('tide-loading').textContent = 'レスポンス形式不明 (dateKey: ' + dateKey + ')';
    return;
  }

  // 潮の種類（APIの正式値を優先、なければ月齢推定）
  const moonTitle = chart.moon?.title || calcTideType(new Date());
  document.getElementById('tide-type-badge').innerHTML =
    `<span class="tide-badge ${moonTitle}">${moonTitle}</span>`;

  const hourly = chart.tide || [];
  const edd   = chart.edd   || [];  // 干潮
  const flood = chart.flood || [];  // 満潮

  if (!hourly.length) {
    document.getElementById('tide-loading').textContent = '潮汐データが空です';
    return;
  }

  const labels  = hourly.map(h => h.time);
  const heights = hourly.map(h => h.cm);
  const nowHour = now.getHours();

  const canvas = document.getElementById('tide-chart');
  if (tideChartInst) { tideChartInst.destroy(); tideChartInst = null; }

  tideChartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: heights,
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56,189,248,0.12)',
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        annotation: {},
      },
      scales: {
        x: { ticks: { color: '#7898b8', font: { size: 11 }, maxTicksLimit: 8 }, grid: { color: '#1e3a5f' } },
        y: { ticks: { color: '#7898b8', font: { size: 11 } }, grid: { color: '#1e3a5f' } }
      }
    }
  });

  // 満潮(flood) / 干潮(edd) — APIから正式値を使用
  const maxH = Math.max(...heights);
  const minH = Math.min(...heights);

  document.getElementById('tide-meta').innerHTML = `
    <div class="tide-meta-item"><div class="label">最高潮位</div><div class="val">${maxH}cm</div></div>
    <div class="tide-meta-item"><div class="label">最低潮位</div><div class="val">${minH}cm</div></div>
  `;

  // 満潮・干潮をマージしてtime順にソート
  const peaks = [
    ...flood.map(p => ({ ...p, type: '満潮', icon: '↑', color: '#38bdf8' })),
    ...edd.map(p =>   ({ ...p, type: '干潮', icon: '↓', color: '#7898b8' })),
  ].sort((a, b) => a.time.localeCompare(b.time));

  document.getElementById('tide-peaks').innerHTML = peaks.length
    ? peaks.map(p =>
        `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;">
          <span style="color:${p.color}">${p.icon} ${p.type}</span>
          <span>${p.time}</span>
          <span style="color:var(--cyan);font-weight:600">${p.cm}cm</span>
        </div>`
      ).join('')
    : '<div style="color:var(--muted);font-size:13px;">満干潮データなし</div>';

  // 月の情報も表示（輝面・月齢）
  const moon = chart.moon;
  if (moon) {
    document.getElementById('tide-meta').innerHTML += `
      <div class="tide-meta-item"><div class="label">月齢</div><div class="val">${parseFloat(moon.age).toFixed(1)}</div></div>
      <div class="tide-meta-item"><div class="label">輝面</div><div class="val">${Math.round(moon.brightness * 100)}%</div></div>
    `;
  }
}

// ═══════════════════════════════════════════════════════
// 風マップ（Windy）
// ═══════════════════════════════════════════════════════
function loadWind() {
  if (!currentSpot) return;
  const { lat, lon } = currentSpot;

  const loading = document.getElementById('windy-loading');
  const frame = document.getElementById('windy-frame');

  const spotKey = `${currentSpot.lat.toFixed(3)}_${currentSpot.lon.toFixed(3)}`;
  if (windyLoaded && frame.dataset.spot === spotKey) return;

  loading.style.display = 'flex';
  frame.style.display = 'none';

  const src = `https://embed.windy.com/embed2.html` +
    `?lat=${lat}&lon=${lon}` +
    `&detailLat=${lat}&detailLon=${lon}` +
    `&width=800&height=440&zoom=8` +
    `&level=surface&overlay=wind&product=ecmwf` +
    `&menu=&message=true&marker=true` +
    `&calendar=now&pressure=&type=map` +
    `&location=coordinates&detail=` +
    `&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

  frame.src = src;
  frame.dataset.spot = spotKey;

  frame.onload = () => {
    loading.style.display = 'none';
    frame.style.display = 'block';
    windyLoaded = true;
  };
  frame.onerror = () => {
    loading.textContent = '風マップの読み込みに失敗しました';
  };
}

// ═══════════════════════════════════════════════════════
// 潮汐カレンダー
// ═══════════════════════════════════════════════════════

// 旧暦ベースの潮の種類計算
// 月齢0,1,14,15,16,29→大潮 / 6,7,8,21,22,23→小潮 / 12,13,27,28→長潮→若潮 / それ以外→中潮
function calcTideType(date) {
  const age = calcMoonAge(date);
  const a = Math.round(age) % 30;
  if ([0,1,14,15,16,28,29].includes(a)) return '大潮';
  if ([6,7,8,21,22,23].includes(a)) return '小潮';
  if ([11,12,26,27].includes(a)) return '長潮';
  if ([13,28].includes(a)) return '若潮';
  return '中潮';
}

function calcMoonAge(date) {
  // 簡易月齢計算（新月2000-01-06基準）
  const known = new Date(2000, 0, 6, 18, 14);
  const diff = (date - known) / (1000 * 60 * 60 * 24);
  return ((diff % 29.53053) + 29.53053) % 29.53053;
}

const TIDE_EMOJI = { '大潮':'🔴', '中潮':'🟠', '小潮':'🟢', '長潮':'⚪', '若潮':'🔵' };

function renderCalendar() {
  const title = document.getElementById('cal-title');
  title.textContent = `${calYear}年${calMonth + 1}月`;

  const grid = document.getElementById('cal-grid');
  const today = new Date();

  // 曜日ヘッダー
  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // 月初曜日
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const tideType = calcTideType(date);
    const emoji = TIDE_EMOJI[tideType];
    const isToday = (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear());
    html += `
      <div class="cal-day${isToday ? ' today' : ''}" onclick="calDayClick(${d})">
        <div class="cday">${d}</div>
        <div class="ctide-dot">${emoji}</div>
        <div class="ctide" style="color:var(--muted)">${tideType}</div>
      </div>
    `;
  }

  grid.innerHTML = html;
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function calDayClick(day) {
  // 潮汐タブに切り替え
  const tideBtn = document.querySelectorAll('.tab-btn')[1];
  showTab('tide', tideBtn);
}

// ═══════════════════════════════════════════════════════
// 現在地取得（GPS）
// ═══════════════════════════════════════════════════════
function getGpsLocation() {
  if (!navigator.geolocation) {
    alert('このブラウザは位置情報に対応していません');
    return;
  }
  const btn = document.getElementById('gps-btn');
  btn.textContent = '⏳ 取得中...';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.textContent = '📍 現在地';
      btn.disabled = false;
      const { latitude: lat, longitude: lon } = pos.coords;
      // 最寄り釣り場を検索
      const nearest = findNearestSpot(lat, lon);
      const distKm = haversine(lat, lon, nearest.lat, nearest.lon).toFixed(1);
      // 現在地の仮想スポットと最寄り釣り場の両方を提示
      const gpsSpot = createVirtualSpot(`現在地 (${lat.toFixed(3)}, ${lon.toFixed(3)})`, lat, lon);
      showGpsResults(gpsSpot, nearest, distKm);
    },
    err => {
      btn.textContent = '📍 現在地';
      btn.disabled = false;
      const msgs = { 1: '位置情報の許可が必要です', 2: '位置情報を取得できません', 3: 'タイムアウトしました' };
      alert(msgs[err.code] || '位置情報エラー');
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

function showGpsResults(gpsSpot, nearest, distKm) {
  const el = document.getElementById('spot-list');
  el.innerHTML = `
    <div class="spot-item geo-result-item" onclick="selectSpot(gpsVirtualSpot)">
      <div class="spot-name">📍 現在地の天気を見る</div>
      <div class="spot-area">緯度 ${gpsSpot.lat.toFixed(4)} / 経度 ${gpsSpot.lon.toFixed(4)}</div>
    </div>
    <div class="spot-item" onclick="selectSpot(spots.find(x=>x.id==='${nearest.id}'))">
      <div class="spot-name">🎣 最寄り釣り場: ${nearest.name}</div>
      <div class="spot-area">${nearest.prefecture} · 直線距離 ${distKm}km · ${nearest.types.join(' ')}</div>
    </div>
  `;
  gpsVirtualSpot = gpsSpot;
  el.classList.add('open');
}

let gpsVirtualSpot = null;
let geocodeVirtualSpot = null;

// 地名・住所ジオコーディング（Nominatim/OpenStreetMap）
// ═══════════════════════════════════════════════════════
let geocodeTimer = null;

async function geocodeSearch(query) {
  if (!query || query.length < 2) return;
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&accept-language=ja&countrycodes=jp&limit=3`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
    if (!res.ok) return;
    const results = await res.json();
    return results.map(r => ({
      name: r.display_name.split(',')[0],
      fullName: r.display_name,
      lat: parseFloat(r.lat),
      lon: parseFloat(r.lon),
    }));
  } catch {
    return [];
  }
}

// バーチャルスポット（釣り場登録なしの任意地点）
// ═══════════════════════════════════════════════════════
function createVirtualSpot(name, lat, lon) {
  return {
    id: 'custom_' + Date.now(),
    name,
    prefecture: 'カスタム',
    area: '任意の地点',
    lat,
    lon,
    jmaCode: null,
    tidePort: null,
    types: ['カスタム地点'],
    isCustom: true,
  };
}

// ═══════════════════════════════════════════════════════
// 距離計算（ハーバーサイン公式）
// ═══════════════════════════════════════════════════════
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function findNearestSpot(lat, lon) {
  return spots.reduce((best, s) => {
    const d = haversine(lat, lon, s.lat, s.lon);
    return d < haversine(lat, lon, best.lat, best.lon) ? s : best;
  }, spots[0]);
}
