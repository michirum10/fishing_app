<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>釣り天気 動作確認</title>
  <style>
    body { font-family: monospace; background: #0b1120; color: #e2e8f0; padding: 20px; }
    h2 { color: #38bdf8; }
    .ok  { color: #22c55e; }
    .err { color: #ef4444; }
    pre  { background: #1a2540; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
    .section { margin-bottom: 24px; }
  </style>
</head>
<body>
  <h1>🎣 API 動作確認</h1>

  <div class="section">
    <h2>① 気象庁API（和歌山・南部）</h2>
    <pre id="weather">読み込み中...</pre>
  </div>

  <div class="section">
    <h2>② 日の出・日没（串本）</h2>
    <pre id="sun">読み込み中...</pre>
  </div>

  <div class="section">
    <h2>③ 潮汐API（要portコード設定）</h2>
    <pre id="tide">tide736.netでportコードを確認後、tide.jsを設定してください</pre>
  </div>

  <script>
    // ① 気象庁
    fetch('/api/weather?code=300000')
      .then(r => r.json())
      .then(data => {
        const ts = data[0].timeSeries[0];
        const nanbu = ts.areas.find(a => a.area.name === '南部');
        document.getElementById('weather').innerHTML =
          `<span class="ok">✅ 取得成功</span>\n` +
          `天気: ${nanbu?.weathers?.[0] ?? 'N/A'}\n` +
          `風:   ${nanbu?.winds?.[0] ?? 'N/A'}\n` +
          `波:   ${nanbu?.waves?.[0] ?? 'N/A'}`;
      })
      .catch(e => {
        document.getElementById('weather').innerHTML = `<span class="err">❌ エラー: ${e.message}</span>`;
      });

    // ② 日の出・日没（串本）
    fetch('/api/sun?lat=33.477&lon=135.856')
      .then(r => r.json())
      .then(data => {
        document.getElementById('sun').innerHTML =
          `<span class="ok">✅ 取得成功</span>\n` +
          `日の出:    ${data.sunrise}\n` +
          `日の入り:  ${data.sunset}\n` +
          `朝マズメ:  ${data.mornStart} 〜 ${data.mornEnd}\n` +
          `夕マズメ:  ${data.duskStart} 〜 ${data.duskEnd}`;
      })
      .catch(e => {
        document.getElementById('sun').innerHTML = `<span class="err">❌ エラー: ${e.message}</span>`;
      });
  </script>
</body>
</html>
